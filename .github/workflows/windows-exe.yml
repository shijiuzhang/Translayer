name: Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload the Windows package to"
        required: false
        default: ""
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Windows OCR tools
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress
          choco install poppler -y --no-progress
          "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH
          $pdftoppm = Get-ChildItem -Path $env:ChocolateyInstall, "C:\tools" -Recurse -Filter pdftoppm.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pdftoppm) { throw "pdftoppm.exe not found after installing poppler" }
          $pdftoppm.Directory.FullName >> $env:GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,gemini]"
          uv pip install --system pyinstaller pytesseract opencv-python

      - name: Lint
        run: ruff check src/translayer tests

      - name: Test
        run: pytest -q

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean --onefile --name Translayer --collect-submodules translayer --add-data "src/translayer/web;translayer/web" src/translayer/desktop.py

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "manual" }
          $packageDir = "dist\Translayer-Windows"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "dist\Translayer.exe" "$packageDir\Translayer.exe"
          Copy-Item "packaging\windows\README-WINDOWS.md" "$packageDir\README-WINDOWS.md"
          New-Item -ItemType Directory -Force -Path "$packageDir\tools" | Out-Null

          $tesseractSource = "C:\Program Files\Tesseract-OCR"
          $tesseractTarget = "$packageDir\tools\tesseract"
          if (-not (Test-Path "$tesseractSource\tesseract.exe")) {
            throw "tesseract.exe not found at $tesseractSource"
          }
          Copy-Item $tesseractSource $tesseractTarget -Recurse

          $tessdataTarget = "$tesseractTarget\tessdata"
          New-Item -ItemType Directory -Force -Path $tessdataTarget | Out-Null
          foreach ($lang in @("eng", "deu", "chi_sim")) {
            $trainedData = "$tessdataTarget\$lang.traineddata"
            if (-not (Test-Path $trainedData)) {
              Invoke-WebRequest `
                -Uri "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/$lang.traineddata" `
                -OutFile $trainedData
            }
          }

          $pdftoppm = Get-ChildItem -Path $env:ChocolateyInstall, "C:\tools" -Recurse -Filter pdftoppm.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pdftoppm) { throw "pdftoppm.exe not found after installing poppler" }
          $popplerTarget = "$packageDir\tools\poppler\bin"
          New-Item -ItemType Directory -Force -Path $popplerTarget | Out-Null
          Copy-Item "$($pdftoppm.Directory.FullName)\*" $popplerTarget -Recurse

          $archive = "dist\Translayer-$tag-windows-x64.zip"
          if (Test-Path $archive) { Remove-Item $archive }
          Compress-Archive -Path "$packageDir\*" -DestinationPath $archive
          "archive=$archive" >> $env:GITHUB_OUTPUT
        id: package

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Translayer-Windows
          path: ${{ steps.package.outputs.archive }}

      - name: Upload release asset
        if: ${{ github.event_name == 'release' || inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name || inputs.release_tag }}" "${{ steps.package.outputs.archive }}" --clobber
