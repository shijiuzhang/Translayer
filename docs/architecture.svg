<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1080" height="560" fill="#ffffff"/>
  <text x="540" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2328">Translayer</text>
  <text x="540" y="74" text-anchor="middle" font-size="15" fill="#57606a">Any format in, any language out — layout and in-image text intact.</text>

  <!-- input -->
  <rect x="40" y="120" rx="10" width="150" height="64" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="115" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">input.pptx</text>
  <text x="115" y="170" text-anchor="middle" font-size="12" fill="#57606a">docx · html · md …</text>

  <!-- pipeline boxes -->
  <g>
    <rect x="230" y="112" rx="10" width="150" height="80" fill="#ddf4ff" stroke="#0969da"/>
    <text x="305" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="#0969da">Parse</text>
    <text x="305" y="168" text-anchor="middle" font-size="11" fill="#57606a">format plugin</text>

    <rect x="420" y="112" rx="10" width="150" height="80" fill="#ddf4ff" stroke="#0969da"/>
    <text x="495" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="#0969da">Enrich</text>
    <text x="495" y="168" text-anchor="middle" font-size="11" fill="#57606a">roles · OCR · terms</text>

    <rect x="610" y="112" rx="10" width="150" height="80" fill="#ddf4ff" stroke="#0969da"/>
    <text x="685" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="#0969da">Localize</text>
    <text x="685" y="168" text-anchor="middle" font-size="11" fill="#57606a">engines · images</text>

    <rect x="800" y="112" rx="10" width="150" height="80" fill="#ddf4ff" stroke="#0969da"/>
    <text x="875" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="#0969da">Render</text>
    <text x="875" y="168" text-anchor="middle" font-size="11" fill="#57606a">format plugin</text>
  </g>

  <!-- output -->
  <rect x="990" y="120" rx="10" width="70" height="64" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="1025" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1a7f37">out</text>

  <!-- arrows -->
  <g stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="190" y1="152" x2="226" y2="152"/>
    <line x1="380" y1="152" x2="416" y2="152"/>
    <line x1="570" y1="152" x2="606" y2="152"/>
    <line x1="760" y1="152" x2="796" y2="152"/>
    <line x1="950" y1="152" x2="986" y2="152"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#57606a"/>
    </marker>
  </defs>

  <!-- IR band -->
  <rect x="230" y="232" rx="12" width="720" height="120" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="590" y="262" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2328">DocumentIR — open intermediate representation</text>
  <text x="590" y="290" text-anchor="middle" font-size="13" fill="#57606a">meta (langs · glossary)  ·  resources (fonts · images + in-image text)</text>
  <text x="590" y="312" text-anchor="middle" font-size="13" fill="#57606a">blocks: semantic_role · constraints · term_hits · source_ref (lossless write-back)</text>
  <text x="590" y="336" text-anchor="middle" font-size="12" font-style="italic" fill="#1a7f37">The value is the metadata around the text, not the text itself.</text>

  <!-- connectors from stages to IR -->
  <g stroke="#d0d7de" stroke-width="1.5" stroke-dasharray="4 3">
    <line x1="305" y1="192" x2="305" y2="232"/>
    <line x1="495" y1="192" x2="495" y2="232"/>
    <line x1="685" y1="192" x2="685" y2="232"/>
    <line x1="875" y1="192" x2="875" y2="232"/>
  </g>

  <!-- in-image highlight -->
  <rect x="230" y="400" rx="10" width="720" height="110" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="590" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#7d4e00">In-image text pipeline (the differentiator)</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" fill="#7d4e00">OCR detect  →  erase (inpaint)  →  translate  →  re-typeset with real font  →  VLM check</text>
  <text x="590" y="480" text-anchor="middle" font-size="12" fill="#7d4e00">Pluggable everything: parsers · renderers · translation / OCR / inpaint engines are adapters.</text>
</svg>
